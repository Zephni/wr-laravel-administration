<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRLA Documentation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900" x-data="documentationApp()" x-init="initApp()">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <a href="index.html" class="text-xl font-bold text-indigo-600 hover:text-indigo-700">WRLA Documentation</a>
                </div>
                
                <!-- Search -->
                <div class="flex-1 max-w-lg mx-8">
                    <div class="relative">
                        <input 
                            type="text" 
                            x-model="searchQuery"
                            @input="performSearch()"
                            placeholder="Search documentation..." 
                            class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                        >
                        <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                </div>
                
                <!-- Mobile menu button -->
                <button @click="mobileMenuOpen = !mobileMenuOpen" class="md:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Search Results Dropdown -->
        <div x-show="searchResults.length > 0" x-cloak class="absolute top-16 right-0 w-full max-w-lg bg-white border border-gray-200 rounded-lg shadow-lg mx-auto left-0 right-0 max-w-7xl mx-4" style="display: none;">
            <div class="max-h-96 overflow-y-auto">
                <template x-for="result in searchResults" :key="result.page">
                    <a :href="result.url" class="block px-4 py-3 hover:bg-gray-50 border-b border-gray-100 last:border-0">
                        <div class="font-medium text-indigo-600" x-text="result.title"></div>
                        <div class="text-sm text-gray-600" x-text="result.preview"></div>
                    </a>
                </template>
            </div>
        </div>
    </header>

    <div class="flex">
        <!-- Sidebar Navigation -->
        <aside 
            x-show="mobileMenuOpen || !isMobile()" 
            x-cloak
            class="w-64 bg-white border-r border-gray-200 min-h-screen fixed left-0 top-16 overflow-y-auto hidden md:block"
            :class="{'block': mobileMenuOpen, 'hidden': !mobileMenuOpen && isMobile()}"
        >
            <nav class="p-4">
                <div class="space-y-2">
                    <template x-for="section in navigation" :key="section.title">
                        <div>
                            <h3 class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2" x-text="section.title"></h3>
                            <div class="space-y-1">
                                <template x-for="item in section.items" :key="item.title">
                                    <a 
                                        :href="item.url" 
                                        class="flex items-center px-3 py-2 text-sm font-medium rounded-md transition-colors"
                                        :class="currentPage === item.url ? 'bg-indigo-50 text-indigo-700' : 'text-gray-700 hover:bg-gray-100'"
                                        x-text="item.title"
                                    ></a>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 md:ml-64 p-8">
            <div class="max-w-4xl mx-auto">
                <div id="content-area" class="bg-white rounded-lg shadow-sm p-8">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <script src="documentation.js"></script>
</body>
</html>
