<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WRLA Documentation</title>
    <link rel="icon" type="image/png" href="https://webregulate.co.uk/storage/images/wr-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50:  '#e0f8f5',
                            100: '#b3f0e9',
                            200: '#80e6d9',
                            300: '#4ddcc9',
                            400: '#26d4bc',
                            500: '#00BFA6',
                            600: '#00a892',
                            700: '#00907c',
                            800: '#007564',
                            900: '#005940',
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style type="text/tailwindcss">
        /* ── Alpine.js cloak ─────────────────────────────── */
        [x-cloak] { display: none !important; }

        /* ── Typography ──────────────────────────────────── */
        .docs-title {
            @apply text-3xl font-bold text-gray-900 mb-6;
        }

        .docs-heading {
            @apply text-2xl font-semibold text-gray-800 mb-4 flex items-center;
        }

        .docs-subheading {
            @apply text-xl font-semibold text-gray-700 mb-3;
        }

        .docs-body {
            @apply text-gray-600 mb-4;
        }

        .docs-link {
            @apply text-primary-500 underline;
        }
        .docs-link:hover {
            @apply text-primary-700;
        }

        /* ── Step badge (numbered circle beside a heading) ── */
        .docs-step-badge {
            @apply inline-flex items-center justify-center w-8 h-8 bg-primary-500 text-white rounded-full mr-3 text-base leading-none font-semibold shrink-0;
            padding-bottom: 2.5px; /* visual correction: numerals sit low in their em-square */
        }

        /* ── Section wrapper ─────────────────────────────── */
        .docs-section {
            @apply mb-8;
        }

        /* ── Code ────────────────────────────────────────── */
        .docs-code-block {
            @apply relative bg-gray-900 rounded-lg p-4 overflow-x-auto;
        }

        .docs-code-block pre,
        .docs-code-block code {
            @apply text-green-400 text-sm;
        }

        .docs-inline-code {
            @apply border border-gray-300 bg-gray-50 text-green-800 pt-[1px] pb-[2px] px-2 rounded text-sm font-mono;
        }

        /* ── Callout / Alert ─────────────────────────────── */
        /* Usage: <div class="docs-callout docs-callout-warning"> */
        .docs-callout {
            @apply flex border-l-4 p-4 mb-6;
        }

        .docs-callout-warning {
            @apply bg-yellow-50 border-yellow-400;
        }

        .docs-callout-info {
            @apply bg-blue-50 border-blue-400;
        }

        .docs-callout-success {
            @apply bg-green-50 border-green-400;
        }

        .docs-callout-danger {
            @apply bg-red-50 border-red-400;
        }

        .docs-callout-icon {
            @apply shrink-0 mr-3;
        }

        .docs-callout-icon svg {
            @apply h-5 w-5;
        }

        .docs-callout-warning .docs-callout-icon svg { @apply text-yellow-400; }
        .docs-callout-info    .docs-callout-icon svg { @apply text-blue-400; }
        .docs-callout-success .docs-callout-icon svg { @apply text-green-400; }
        .docs-callout-danger  .docs-callout-icon svg { @apply text-red-400; }

        .docs-callout-body {
            @apply flex-1 text-sm;
        }

        .docs-callout-warning .docs-callout-body { @apply text-yellow-700; }
        .docs-callout-info    .docs-callout-body { @apply text-blue-700; }
        .docs-callout-success .docs-callout-body { @apply text-green-700; }
        .docs-callout-danger  .docs-callout-body { @apply text-red-700; }

        /* ── Navigation ──────────────────────────────────── */
        .docs-nav-label {
            @apply px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2;
        }

        .docs-nav-link {
            @apply flex items-center py-2 px-3 text-sm font-medium rounded-md transition-colors;
        }

        .docs-nav-link-sub {
            @apply flex items-center py-1.5 pl-6 pr-3 text-xs font-medium rounded-md transition-colors;
        }

        .docs-nav-link-active {
            @apply bg-primary-50 text-primary-600;
        }

        .docs-nav-link-inactive {
            @apply text-gray-700;
        }

        .docs-nav-link-inactive:hover {
            @apply bg-gray-100;
        }

        /* ── Table ───────────────────────────────────────── */
        .docs-table {
            @apply w-full text-sm text-left mb-4;
            border-collapse: collapse;
        }
        .docs-table th {
            @apply bg-gray-100 text-gray-700 font-semibold text-left;
            padding: 0.625rem 1rem;
            border: 1px solid #e5e7eb;
        }
        .docs-table td {
            @apply text-gray-600 align-top;
            padding: 0.625rem 1rem;
            border: 1px solid #e5e7eb;
        }
        .docs-table tbody tr:nth-child(even) td {
            @apply bg-gray-50;
        }

        /* ── Lead / intro paragraph ──────────────────────── */
        .docs-lead {
            @apply text-lg text-gray-600 mb-8;
        }

        /* ── Quick-start nav cards ───────────────────────── */
        .docs-card {
            @apply flex flex-col gap-3 p-6 border rounded-xl transition-all;
        }

        .docs-card-header {
            @apply flex items-center gap-3;
        }

        .docs-card-icon {
            @apply flex items-center justify-center w-10 h-10 rounded-lg transition-colors shrink-0;
        }

        .docs-card-icon svg {
            @apply h-5 w-5;
        }

        .docs-card-title {
            @apply text-base font-semibold;
        }

        .docs-card-body {
            @apply text-sm leading-relaxed;
        }

        .docs-card-link {
            @apply mt-auto text-xs font-medium;
        }

        .docs-card:hover .docs-card-link {
            @apply underline;
        }

        /* Card colour variants */
        .docs-card-teal                      { @apply bg-teal-50   border-teal-200   hover:bg-teal-100   hover:border-teal-300;   }
        .docs-card-teal   .docs-card-icon    { @apply bg-teal-100;   }
        .docs-card-teal:hover .docs-card-icon { @apply bg-teal-200; }
        .docs-card-teal   .docs-card-icon svg { @apply text-teal-600;   }
        .docs-card-teal   .docs-card-title   { @apply text-teal-900;   }
        .docs-card-teal   .docs-card-body    { @apply text-teal-700;   }
        .docs-card-teal   .docs-card-link    { @apply text-teal-600;   }

        .docs-card-green                      { @apply bg-green-50  border-green-200  hover:bg-green-100  hover:border-green-300;  }
        .docs-card-green  .docs-card-icon    { @apply bg-green-100;  }
        .docs-card-green:hover .docs-card-icon { @apply bg-green-200; }
        .docs-card-green  .docs-card-icon svg { @apply text-green-600;  }
        .docs-card-green  .docs-card-title   { @apply text-green-900;  }
        .docs-card-green  .docs-card-body    { @apply text-green-700;  }
        .docs-card-green  .docs-card-link    { @apply text-green-600;  }

        .docs-card-orange                      { @apply bg-orange-50 border-orange-200 hover:bg-orange-100 hover:border-orange-300; }
        .docs-card-orange .docs-card-icon    { @apply bg-orange-100; }
        .docs-card-orange:hover .docs-card-icon { @apply bg-orange-200; }
        .docs-card-orange .docs-card-icon svg { @apply text-orange-600; }
        .docs-card-orange .docs-card-title   { @apply text-orange-900; }
        .docs-card-orange .docs-card-body    { @apply text-orange-700; }
        .docs-card-orange .docs-card-link    { @apply text-orange-600; }

        .docs-card-purple                      { @apply bg-purple-50 border-purple-200 hover:bg-purple-100 hover:border-purple-300; }
        .docs-card-purple .docs-card-icon    { @apply bg-purple-100; }
        .docs-card-purple:hover .docs-card-icon { @apply bg-purple-200; }
        .docs-card-purple .docs-card-icon svg { @apply text-purple-600; }
        .docs-card-purple .docs-card-title   { @apply text-purple-900; }
        .docs-card-purple .docs-card-body    { @apply text-purple-700; }
        .docs-card-purple .docs-card-link    { @apply text-purple-600; }

        .docs-card-blue                      { @apply bg-blue-50   border-blue-200   hover:bg-blue-100   hover:border-blue-300;   }
        .docs-card-blue   .docs-card-icon    { @apply bg-blue-100;   }
        .docs-card-blue:hover .docs-card-icon { @apply bg-blue-200; }
        .docs-card-blue   .docs-card-icon svg { @apply text-blue-600;   }
        .docs-card-blue   .docs-card-title   { @apply text-blue-900;   }
        .docs-card-blue   .docs-card-body    { @apply text-blue-700;   }
        .docs-card-blue   .docs-card-link    { @apply text-blue-600;   }

        .docs-card-rose                      { @apply bg-rose-50   border-rose-200   hover:bg-rose-100   hover:border-rose-300;   }
        .docs-card-rose   .docs-card-icon    { @apply bg-rose-100;   }
        .docs-card-rose:hover .docs-card-icon { @apply bg-rose-200; }
        .docs-card-rose   .docs-card-icon svg { @apply text-rose-600;   }
        .docs-card-rose   .docs-card-title   { @apply text-rose-900;   }
        .docs-card-rose   .docs-card-body    { @apply text-rose-700;   }
        .docs-card-rose   .docs-card-link    { @apply text-rose-600;   }
    </style>
</head>
<body class="relative bg-gray-50 text-gray-900" x-data="documentationApp()" x-init="initApp()">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="flex items-center h-16 px-4">
            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-2.5 whitespace-nowrap shrink-0">
                <img src="https://webregulate.co.uk/storage/images/wr-icon.png" alt="WR" class="h-7 w-7 shrink-0">
                <span class="text-xl font-bold"><span class="text-primary-500">WRLA</span> <span class="text-slate-700">Documentation</span></span>
            </a>

            <!-- Desktop search -->
            <div class="hidden md:flex flex-1 justify-center px-8">
                <div class="relative w-full max-w-lg">
                    <input 
                        type="text" 
                        x-model="searchQuery"
                        @input="performSearch()"
                        placeholder="Search documentation..." 
                        class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500"
                    >
                    <svg class="absolute left-3 top-2.5 h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    <!-- Desktop Search Results Dropdown -->
                    <div x-show="searchResults.length > 0" x-cloak class="absolute top-full left-0 right-0 mt-1 bg-white border border-gray-200 rounded-lg shadow-lg z-50 max-h-80 overflow-y-auto">
                        <template x-for="result in searchResults" :key="result.page">
                            <a :href="result.url" class="block px-4 py-3 hover:bg-gray-50 border-b border-gray-100 last:border-0">
                                <div class="font-medium text-primary-500" x-text="result.title"></div>
                                <div class="text-sm text-gray-600" x-text="result.preview"></div>
                            </a>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Spacer (mobile only) -->
            <div class="flex-1 md:hidden"></div>

            <!-- Burger button (mobile only) -->
            <button 
                @click="mobileMenuOpen = !mobileMenuOpen" 
                class="md:hidden p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-primary-500"
                aria-label="Toggle navigation menu"
                :aria-expanded="mobileMenuOpen"
            >
                <!-- Hamburger icon (menu closed) -->
                <svg x-show="!mobileMenuOpen" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
                <!-- X icon (menu open) -->
                <svg x-show="mobileMenuOpen" x-cloak class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </header>

    <!-- Mobile backdrop overlay -->
    <div 
        x-show="mobileMenuOpen" 
        x-cloak
        @click="mobileMenuOpen = false"
        class="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden"
        x-transition:enter="transition-opacity ease-linear duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition-opacity ease-linear duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
    ></div>

    <div class="flex">
        <!-- Sidebar / Mobile Drawer -->
        <aside 
            class="fixed left-0 top-16 h-[calc(100vh-4rem)] w-72 md:w-64 bg-white border-r border-gray-200 overflow-y-auto z-50 transition-transform duration-300 ease-in-out md:translate-x-0"
            :class="mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'"
        >
            <!-- Mobile search (inside drawer) -->
            <div class="md:hidden p-4 border-b border-gray-100">
                <div class="relative">
                    <input 
                        type="text" 
                        x-model="searchQuery"
                        @input="performSearch()"
                        placeholder="Search documentation..." 
                        class="w-full pl-9 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-sm"
                    >
                    <svg class="absolute left-2.5 top-2.5 h-4 w-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <!-- Mobile search results (inline in drawer) -->
                <div x-show="searchResults.length > 0" x-cloak class="mt-2 border border-gray-200 rounded-lg overflow-hidden">
                    <template x-for="result in searchResults" :key="result.page">
                        <a :href="result.url" class="block px-3 py-2.5 hover:bg-gray-50 border-b border-gray-100 last:border-0">
                            <div class="font-medium text-primary-500 text-sm" x-text="result.title"></div>
                            <div class="text-xs text-gray-600 mt-0.5" x-text="result.preview"></div>
                        </a>
                    </template>
                </div>
            </div>

            <!-- Navigation -->
            <nav class="p-4">
                <div class="space-y-2">
                    <template x-for="section in navigation" :key="section.title">
                        <div>
                            <h3 class="docs-nav-label" x-text="section.title"></h3>
                            <div class="space-y-1">
                                <template x-for="item in section.items" :key="item.title">
                                    <div>
                                        <a 
                                            :href="item.url" 
                                            class="docs-nav-link"
                                            :class="currentPage === item.url ? 'docs-nav-link-active' : 'docs-nav-link-inactive'"
                                            x-text="item.title"
                                        ></a>
                                        <template x-if="item.children && item.children.length > 0">
                                            <div class="mt-0.5 mb-1 space-y-0.5">
                                                <template x-for="child in item.children" :key="child.title">
                                                    <a
                                                        :href="child.url"
                                                        class="docs-nav-link docs-nav-link-sub"
                                                        :class="currentPage === child.url ? 'docs-nav-link-active' : 'docs-nav-link-inactive'"
                                                        x-text="child.title"
                                                    ></a>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="flex-1 md:ml-64 min-w-0">
            <!-- ── Early Development Warning Banner ───────────────── -->
            <div class="sticky top-16 z-20 bg-red-600 border-b border-red-700 text-white py-2.5 px-4">
                <div class="flex items-center justify-center gap-2.5 max-w-4xl mx-auto">
                    <svg class="h-5 w-5 shrink-0" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                        <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.189-1.458-1.515-2.625L8.485 2.495zM10 5a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 5zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
                    </svg>
                    <p class="text-sm font-medium text-center">
                        <strong>Early Development Notice:</strong> This package is not yet v1.0 or ready for public use. Documentation is in the very early stages and things are likely to change before official release.
                    </p>
                </div>
            </div>
            <div class="p-4 md:p-8">
                <div class="max-w-4xl mx-auto">
                    <div id="content-area" class="relative bg-white rounded-lg shadow-sm p-4 sm:p-6 md:p-8 min-h-[300px]">
                        <!-- Loading spinner (hidden once content loads) -->
                        <div id="content-spinner" class="absolute inset-0 flex flex-col items-center justify-center gap-3 rounded-lg bg-white z-10">
                            <svg class="animate-spin h-8 w-8 text-primary-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                            </svg>
                            <span class="text-sm text-gray-500 font-medium">Please wait&hellip;</span>
                        </div>
                        <!-- Dynamic content will be loaded here -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Page content is loaded dynamically from docs/pages/*.html by documentation.js.
         To add a new page: create a new file in docs/pages/, then add it to getNavigation() in documentation.js. -->

    <script src="documentation.js"></script>
</body>
</html>
